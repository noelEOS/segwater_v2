# configs/evaluation/indonesia_inference_run_bootstrap_semarang.yaml
#
# Pixel-level bootstrap accuracy assessment for one inference run directory
# containing probability maps, evaluated over the geospatial overlap with
# selected concurrent S2-derived reference masks.
#
# Run with:
#   python scripts/evaluate_indonesia_inference_run_bootstrap.py \
#     configs/evaluation/indonesia_inference_run_bootstrap_semarang.yaml

evaluation:
