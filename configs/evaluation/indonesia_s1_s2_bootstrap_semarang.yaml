      s1_prediction_path: "/Users/noel/Documents/VisualStudio/projects/sen12coast_global_dl/INDONESIA/results/Sen12Coast_Indonesia_Semarang_unet_from_pretrained_finetuned_SAYUNG_whole_TS/S1_20230731_221741_76_8_9_Unet_Water_Land_Mask.tif"

