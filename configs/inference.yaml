# configs/inference.yaml
defaults:
  - model: smp
  - _self_

inference:
  # --- Hardware & Weights ---
  device: "cuda"
  checkpoint_path: "outputs/checkpoints/best_model.pth"

  # --- Input Data & Tiling Geometry ---
  data:
    input_image: "data/raw/sentinel1_swath.tif"
    batch_size: 8
    num_workers: 4

    # Tiling geometry is now explicit:
    #   tile_size   = valid center crop written/blended into the final probability map
    #   buffer_size = context added on each side before model inference
    #   stride      = spacing between valid crop origins
    #
    # Model input size = tile_size + 2 * buffer_size.
    # Current large-tile mode: 1024 + 2*128 = 1280.
    # Native 224 mode example: tile_size=160, buffer_size=32, stride=80.
    tile_size: 1024
    buffer_size: 128
    stride: 512

    # shift_inward avoids tiny final sliver tiles such as a 128-pixel final strip
    # being inferred from a model input dominated by padding.
    # allow_sliver preserves the older behavior.
    edge_policy: "shift_inward"

    fill_value: 0.0          # Fallback scalar NoData padding for edge tiles.
    precision: "float32"     # Options: "float32" or "float16"
    normalization:
      enabled: true
      method: "standardize_db"
      means: [-15.510920639155525, -23.57375764750785]
      stds: [6.564080466988128, 7.6567358472184]
    padding:
      # Recommended for raw dB inputs: pad out-of-bounds edge context with
      # the training-set channel means so the normalized padding becomes 0.
      mode: "training_channel_mean"
      channel_fill_values:
        - -15.510920639155525
        - -23.57375764750785

  # --- Probability Map Stitching ---
  stitching:
    # crop_only: previous direct-write behavior. If shifted edge tiles overlap,
    #            later tiles overwrite earlier pixels.
    # weighted_blend: high-quality mode. Overlapping valid zones are blended
    #                 with a tapered weight window and normalized at close time.
    mode: "weighted_blend"
    blend_window: "hann"      # Options: "hann", "linear", "constant"
    min_weight: 0.001         # Avoid zero-weight pixels at true image boundaries.

  # --- Output Organization & Provenance ---
  output:
    # Outputs are written as:
    #   {root_dir}/{run_name_or_checkpoint_id}/{scene_id}/{scene_id}_{product}.{ext}
    # By default, the run folder is deterministic and derived from the checkpoint
    # identity, not from a timestamp. Timestamps are stored in metadata instead.
    root_dir: "outputs/inference/runs"
    run_name: null            # Optional manual run name. If null, use checkpoint identity.
    overwrite: false          # Protect existing scene outputs by default.

    save_probability_geotiff: true
    save_binary_mask_geotiff: false
    extract_shoreline: true

  # --- Science / Post-Processing Logic ---
  post_processing:
    threshold: 0.5           # The probability crossing point for the shoreline/mask.

    filtering:
      apply_length_filter: False
      min_length_meters: 50.0
      keep_top_k: 5

    smoothing:
      apply_simplification: False
      simplify_tolerance_meters: 10.0
