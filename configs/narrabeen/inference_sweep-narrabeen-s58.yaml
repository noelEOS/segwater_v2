# configs/inference_sweep-narrabeen-s58.yaml
#
# Per-seed Narrabeen inference sweep (seed = s58).
# checkpoint_path points at the best.pth SYMLINK; the resolved realpath is recorded
# in each run's run_config.yaml. Symlink target verified in logs/provenance/best_checkpoints.json.
# Run name carries the seed so artifacts are disambiguated across seeds.
# Excludes unet_resnet50 augmentation variants by request.
# The sweep runner expands this file into repeated calls to scripts/run_inference.py.

sweep:
  name: "dev_sweep_all_narrabeen_ASC_s58"
  dry_run: false
  continue_on_error: true

  #input_dir: "/home/noel/NARRABEEN_ron_147_ts_9_sn_16/input_data_ron_147_ts_9_sn_16_small_aoi"
  input_dir: "/home/noel/SDS_S1_narrabeen_ASC"
  
  input_glob: "*.tif"

  # Overrides applied to every run in the sweep.
  common_overrides:
    inference.post_processing.smoothing.apply_simplification: true
    inference.post_processing.smoothing.simplify_tolerance_meters: 1.0
    inference.post_processing.filtering.apply_length_filter: false
    inference.post_processing.filtering.min_length_meters: 10000.0
    inference.data.edge_policy: "shift_inward"
    inference.stitching.min_weight: 0.001

  checkpoints:
    - name: "unet_resnet50"
      checkpoint_path: "outputs/stage2/unet_resnet50/s58/best.pth"
      model:
        arch: "unet"
        encoder_name: "resnet50"

    - name: "unetplusplus_resnet50"
      checkpoint_path: "outputs/stage2/unetplusplus_resnet50/s58/best.pth"
      model:
        arch: "unetplusplus"
        encoder_name: "resnet50"

    - name: "deeplabv3plus_resnet50"
      checkpoint_path: "outputs/stage2/deeplabv3plus_resnet50/s58/best.pth"
      model:
        arch: "deeplabv3plus"
        encoder_name: "resnet50"

    - name: "dpt_vit_b_16"
      checkpoint_path: "outputs/stage2/dpt_tu-vit_base_patch16_224.mae/s58/best.pth"
      model:
        arch: "dpt"
        encoder_name: "tu-vit_base_patch16_224.mae"

    - name: "segformer_mit_b4"
      checkpoint_path: "outputs/stage2/segformer_mit_b4/s58/best.pth"
      model:
        arch: "segformer"
        encoder_name: "mit_b4"

    - name: "upernet_swin_base_224"
      checkpoint_path: "outputs/stage2/upernet_tu-swin_base_patch4_window7_224/s58/best.pth"
      model:
        arch: "upernet"
        encoder_name: "tu-swin_base_patch4_window7_224"

    - name: "upernet_tu-convnextv2_base"
      checkpoint_path: "outputs/stage2/upernet_tu-convnextv2_base/s58/best.pth"
      model:
        arch: "upernet"
        encoder_name: "tu-convnextv2_base"

#    (skip upernet_tu-swinv2_base: no s58 checkpoint trained)

  presets:
    - name: "native224_weighted_224_b0_s112"
      overrides:
        inference.data.tile_size: 224
        inference.data.buffer_size: 0
        inference.data.stride: 112
        inference.stitching.mode: "weighted_blend"
        inference.stitching.blend_window: "hann"

    - name: "native224_weighted_224_b0_s32"
      overrides:
        inference.data.tile_size: 224
        inference.data.buffer_size: 0
        inference.data.stride: 32
        inference.stitching.mode: "weighted_blend"
        inference.stitching.blend_window: "hann"

    - name: "native224_weighted_224_b0_s8"
      overrides:
        inference.data.tile_size: 224
        inference.data.buffer_size: 0
        inference.data.stride: 8
        inference.stitching.mode: "weighted_blend"
        inference.stitching.blend_window: "hann"
